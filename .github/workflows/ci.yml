name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: "21"
            experimental: false
          - java: "25"
            experimental: true
          - java: "26"
            experimental: true
          # Gradle cannot run on JVM 27 yet; re-enable when the wrapper supports it.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build
