name: JML

on:
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/jml-analyze
        with:
          tools: jspecify
          fail-on: high
          sarif-upload: true
