---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.AddMavenDependency
displayName: Add JSpecify dependency (Maven)
description: Adds org.jspecify:jspecify as a provided-scope dependency.
recipeList:
  - org.openrewrite.maven.AddDependency:
      groupId: org.jspecify
      artifactId: jspecify
      version: 1.0.0
      scope: provided
      releasesOnly: true
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.AddGradleDependency
displayName: Add JSpecify dependency (Gradle)
description: Adds org.jspecify:jspecify on the compileOnly configuration.
recipeList:
  - org.openrewrite.gradle.AddDependency:
      groupId: org.jspecify
      artifactId: jspecify
      version: 1.0.0
      configuration: compileOnly
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.AddJSpecifyDependency
displayName: Add JSpecify dependency
description: Adds the JSpecify dependency to either Maven or Gradle builds.
recipeList:
  - io.github.jml.jspecify.AddMavenDependency
  - io.github.jml.jspecify.AddGradleDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.ConvertKnownAnnotations
displayName: Convert known nullness annotations to JSpecify
description: |
  Rewrites well-known legacy nullness annotations (JetBrains, JSR-305,
  Spring, FindBugs, Checker Framework, RxJava, Reactor, Android, Lombok)
  to their JSpecify counterparts.
recipeList:
  - io.github.javamodernizationlabs.jspecify.rewrite.ConvertKnownAnnotations
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.FindUnsafeNullnessDefaults
displayName: Find unsafe nullness defaults
description: Marks package-level default/meta nullness annotations for manual review.
recipeList:
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@javax.annotation.ParametersAreNonnullByDefault"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@org.springframework.lang.NonNullApi"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@org.springframework.lang.NonNullFields"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@reactor.util.annotation.NonNullApi"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@reactor.util.annotation.NonNullFields"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@io.micrometer.common.lang.NonNullApi"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@io.micrometer.common.lang.NonNullFields"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@javax.annotation.meta.TypeQualifierDefault"
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.AddNullMarkedToPackage
displayName: Add package-level JSpecify NullMarked
description: Creates or updates package-info.java with package-level @NullMarked.
recipeList:
  - io.github.javamodernizationlabs.jspecify.rewrite.AddNullMarkedToPackage
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.SpringPreset
displayName: Spring JSpecify migration preset
description: Converts Spring nullness annotations and marks Spring package defaults for review.
recipeList:
  - io.github.jml.jspecify.FindUnsafeNullnessDefaults
  - io.github.jml.jspecify.ConvertKnownAnnotations
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.ReactorPreset
displayName: Reactor JSpecify migration preset
description: Converts Reactor nullness annotations and marks Reactor package defaults for review.
recipeList:
  - io.github.jml.jspecify.FindUnsafeNullnessDefaults
  - io.github.jml.jspecify.ConvertKnownAnnotations
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.MicrometerPreset
displayName: Micrometer JSpecify migration preset
description: Converts Micrometer nullness annotations and marks Micrometer package defaults for review.
recipeList:
  - io.github.jml.jspecify.FindUnsafeNullnessDefaults
  - io.github.jml.jspecify.ConvertKnownAnnotations
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.FixTypeUseAnnotationPlacement
displayName: Find ambiguous type-use nullness placements
description: Finds legacy nullable container annotations that require manual container-vs-element review.
recipeList:
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@org.jetbrains.annotations.Nullable"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@javax.annotation.Nullable"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@jakarta.annotation.Nullable"
  - org.openrewrite.java.search.FindAnnotations:
      annotationPattern: "@org.springframework.lang.Nullable"
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.RemoveOldAnnotationDependencies
displayName: Remove legacy nullness annotation dependencies
description: Removes known annotation-only dependencies after usages have been eliminated.
recipeList:
  - org.openrewrite.maven.RemoveDependency:
      groupId: org.jetbrains
      artifactId: annotations
  - org.openrewrite.maven.RemoveDependency:
      groupId: com.google.code.findbugs
      artifactId: jsr305
  - org.openrewrite.maven.RemoveDependency:
      groupId: com.google.code.findbugs
      artifactId: annotations
  - org.openrewrite.maven.RemoveDependency:
      groupId: javax.annotation
      artifactId: javax.annotation-api
  - org.openrewrite.maven.RemoveDependency:
      groupId: jakarta.annotation
      artifactId: jakarta.annotation-api
  - org.openrewrite.gradle.RemoveDependency:
      groupId: org.jetbrains
      artifactId: annotations
  - org.openrewrite.gradle.RemoveDependency:
      groupId: com.google.code.findbugs
      artifactId: jsr305
  - org.openrewrite.gradle.RemoveDependency:
      groupId: com.google.code.findbugs
      artifactId: annotations
  - org.openrewrite.gradle.RemoveDependency:
      groupId: javax.annotation
      artifactId: javax.annotation-api
  - org.openrewrite.gradle.RemoveDependency:
      groupId: jakarta.annotation
      artifactId: jakarta.annotation-api
---
type: specs.openrewrite.org/v1beta/recipe
name: io.github.jml.jspecify.Migrate
displayName: Full JSpecify migration (safe defaults)
description: Adds the JSpecify dependency, marks unsafe defaults for review and converts known nullness annotations.
recipeList:
  - io.github.jml.jspecify.AddJSpecifyDependency
  - io.github.jml.jspecify.FindUnsafeNullnessDefaults
  - io.github.jml.jspecify.FixTypeUseAnnotationPlacement
  - io.github.jml.jspecify.ConvertKnownAnnotations
